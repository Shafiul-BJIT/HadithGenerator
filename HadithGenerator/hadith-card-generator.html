<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hadith Card Generator</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #18211b;
      --muted: #68736c;
      --line: #dce3dd;
      --surface: #ffffff;
      --background: #f3f6f3;
      --accent: #17643a;
      --accent-hover: #104d2c;
      --danger: #8b2e2e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-width: 320px;
      min-height: 100vh;
      margin: 0;
      background: var(--background);
      color: var(--ink);
      font-family: Inter, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    button {
      font: inherit;
    }

    .app {
      width: min(1440px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .app-header h1 {
      margin: 0;
      font-size: 2rem;
      line-height: 1.1;
      font-weight: 800;
    }

    .generate-button,
    .download-button {
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
      transition: background-color 160ms ease, border-color 160ms ease, color 160ms ease;
    }

    .generate-button {
      padding: 10px 18px;
      background: var(--accent);
      color: #ffffff;
    }

    .generate-button:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .generate-button:disabled {
      cursor: not-allowed;
      opacity: .58;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
      align-items: start;
    }

    .card {
      min-width: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 14px 36px rgba(26, 42, 31, .08);
    }

    .image-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 5;
      overflow: hidden;
      background: #e7ece8;
    }

    .image-frame img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .loading-state,
    .error-state {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }

    .loading-state {
      color: var(--muted);
    }

    .loading-state::before {
      width: 32px;
      height: 32px;
      border: 3px solid #c9d3cb;
      border-top-color: var(--accent);
      border-radius: 50%;
      content: "";
      animation: spin .8s linear infinite;
    }

    .loading-state span {
      position: absolute;
      margin-top: 64px;
      font-size: .9rem;
      font-weight: 700;
    }

    .error-state {
      background: #fff5f5;
      color: var(--danger);
      font-weight: 700;
    }

    .card-body {
      padding: 16px;
    }

    .style-label {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: .78rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .quote {
      min-height: 88px;
      margin: 0;
      color: #273129;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1rem;
      line-height: 1.55;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .download-button {
      padding: 9px 10px;
      border-color: #bfcac1;
      background: #ffffff;
      color: #243128;
    }

    .download-button:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
    }

    .download-button:disabled {
      cursor: not-allowed;
      opacity: .45;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 960px) {
      .cards {
        grid-template-columns: 1fr;
      }

      .card {
        display: grid;
        grid-template-columns: minmax(260px, 42%) 1fr;
      }

      .image-frame {
        height: 100%;
        aspect-ratio: 4 / 5;
      }
    }

    @media (max-width: 640px) {
      .app {
        width: min(100% - 20px, 1440px);
        padding-top: 20px;
      }

      .app-header {
        align-items: stretch;
        flex-direction: column;
      }

      .app-header h1 {
        font-size: 1.65rem;
      }

      .card {
        display: block;
      }

      .quote {
        min-height: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>Hadith Card Generator</h1>
      <button id="generateButton" class="generate-button" type="button">Generate 3 Cards</button>
    </header>

    <section id="cards" class="cards" aria-live="polite"></section>
  </main>

  <script>
    const hadiths = [
      "Actions are judged by intentions, and every person will have what they intended.",
      "The best among you are those who have the best manners and character.",
      "None of you truly believes until he loves for his brother what he loves for himself.",
      "A good word is charity.",
      "The strong person is the one who controls himself when angry.",
      "Make things easy and do not make them difficult. Give glad tidings and do not drive people away.",
      "Purity is half of faith.",
      "Allah is gentle and loves gentleness in all matters.",
      "The most beloved deeds to Allah are those done consistently, even if they are few.",
      "Whoever believes in Allah and the Last Day should speak good or remain silent.",
      "Smiling in the face of your brother is charity.",
      "The believer is not one who eats his fill while his neighbor goes hungry.",
      "Modesty brings nothing except good.",
      "The best of people are those who are most beneficial to people.",
      "Do not belittle any good deed, even meeting your brother with a cheerful face."
    ];

    const styles = [
      {
        name: "Dark Geometric",
        prompt: "dark Islamic geometric background, deep charcoal and emerald tones, refined gold Arabic-style calligraphy aesthetic, luxurious symmetrical composition"
      },
      {
        name: "Watercolor Nature",
        prompt: "soft watercolor sky and peaceful nature background, pale blue and fresh green palette, elegant clean serif typography, calm luminous composition"
      },
      {
        name: "Modern Minimal",
        prompt: "minimal white card, bold modern typography, subtle Islamic ornamental border, black and muted green details, generous whitespace, editorial composition"
      }
    ];

    const cardsElement = document.getElementById("cards");
    const generateButton = document.getElementById("generateButton");
    let generationStarted = false;

    function shuffle(items) {
      const copy = [...items];
      for (let index = copy.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [copy[index], copy[randomIndex]] = [copy[randomIndex], copy[index]];
      }
      return copy;
    }

    function buildImageUrl(hadith, style, seed) {
      const prompt = [
        `Hadith text: "${hadith}"`,
        style.prompt,
        "high quality, Islamic art, no people, text overlay",
        "vertical social media quote card, readable English text, accurate spelling"
      ].join(", ");

      return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=1024&height=1280&seed=${seed}&nologo=true`;
    }

    function createCard(hadith, style, index) {
      const article = document.createElement("article");
      article.className = "card";
      article.innerHTML = `
        <div class="image-frame">
          <div class="loading-state"><span>Generating image</span></div>
          <img alt="${style.name} hadith card" hidden>
        </div>
        <div class="card-body">
          <p class="style-label">Style ${String.fromCharCode(65 + index)} · ${style.name}</p>
          <blockquote class="quote">${hadith}</blockquote>
          <div class="actions">
            <button class="download-button" type="button" data-format="png" disabled>Download PNG</button>
            <button class="download-button" type="button" data-format="jpeg" disabled>Download JPG</button>
          </div>
        </div>
      `;

      return article;
    }

    async function loadCardImage(card, imageUrl, index) {
      const image = card.querySelector("img");
      const loadingState = card.querySelector(".loading-state");
      const buttons = card.querySelectorAll(".download-button");

      try {
        const response = await fetch(imageUrl);
        if (!response.ok) {
          throw new Error(`Image request failed with status ${response.status}`);
        }

        const blob = await response.blob();
        const objectUrl = URL.createObjectURL(blob);
        image.src = objectUrl;

        await image.decode();
        image.hidden = false;
        loadingState.remove();

        buttons.forEach((button) => {
          button.disabled = false;
          button.addEventListener("click", () => {
            downloadImage(blob, button.dataset.format, `hadith-card-${index + 1}`);
          });
        });
      } catch (error) {
        loadingState.className = "error-state";
        loadingState.innerHTML = "<span>Image generation failed.</span>";
        console.error(error);
      }
    }

    async function downloadImage(sourceBlob, format, filename) {
      const sourceUrl = URL.createObjectURL(sourceBlob);
      const image = new Image();

      try {
        image.src = sourceUrl;
        await image.decode();

        const canvas = document.createElement("canvas");
        canvas.width = image.naturalWidth;
        canvas.height = image.naturalHeight;

        const context = canvas.getContext("2d");
        if (format === "jpeg") {
          context.fillStyle = "#ffffff";
          context.fillRect(0, 0, canvas.width, canvas.height);
        }
        context.drawImage(image, 0, 0);

        const outputBlob = await new Promise((resolve, reject) => {
          canvas.toBlob(
            (blob) => blob ? resolve(blob) : reject(new Error("Image conversion failed")),
            `image/${format}`,
            format === "jpeg" ? 0.92 : undefined
          );
        });

        const downloadUrl = URL.createObjectURL(outputBlob);
        const anchor = document.createElement("a");
        anchor.href = downloadUrl;
        anchor.download = `${filename}.${format === "jpeg" ? "jpg" : "png"}`;
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        URL.revokeObjectURL(downloadUrl);
      } catch (error) {
        console.error(error);
        window.alert("Download failed. Please try again.");
      } finally {
        URL.revokeObjectURL(sourceUrl);
      }
    }

    function generateCards() {
      if (generationStarted) {
        return;
      }

      generationStarted = true;
      generateButton.disabled = true;
      generateButton.textContent = "Generating...";

      const selectedHadiths = shuffle(hadiths).slice(0, 3);
      cardsElement.innerHTML = "";

      selectedHadiths.forEach((hadith, index) => {
        const style = styles[index];
        const card = createCard(hadith, style, index);
        const seed = Math.floor(Math.random() * 1_000_000_000);

        cardsElement.appendChild(card);
        loadCardImage(card, buildImageUrl(hadith, style, seed), index);
      });

      generateButton.hidden = true;
    }

    generateButton.addEventListener("click", generateCards, { once: true });
    window.addEventListener("DOMContentLoaded", generateCards, { once: true });
  </script>
</body>
</html>
